# ─────────────────────────────────────────────
#  Application
# ─────────────────────────────────────────────
spring.application.name=finance-tracker
server.port=8080

# ─────────────────────────────────────────────
#  PostgreSQL Database
#  Change these values to match your local DB
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/financedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─────────────────────────────────────────────
#  JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────
#  JWT Configuration
#  Change jwt.secret to any long random string (min 32 chars)
# ─────────────────────────────────────────────
jwt.secret=mySecretKeyForJWTTokenGenerationMustBe32CharsLong!
jwt.expiration=86400000

# ─────────────────────────────────────────────
#  OpenAI API
#  Paste your API key here
# ─────────────────────────────────────────────
openai.api.key=your_openai_api_key_here
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# ─────────────────────────────────────────────
#  Email Configuration (Gmail)
#  Use an App Password, not your Gmail password
#  Guide: myaccount.google.com → Security → App Passwords
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────
#  Swagger UI
# ─────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
