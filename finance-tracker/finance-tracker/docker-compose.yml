version: '3.8'

services:

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: finance-postgres
    environment:
      POSTGRES_DB: financedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot application
  app:
    build: .
    container_name: finance-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/financedb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: mySecretKeyForJWTTokenGenerationMustBe32CharsLong!
      OPENAI_API_KEY: ${OPENAI_API_KEY}          # pass from your .env file
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}     # pass from your .env file
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}     # pass from your .env file
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
